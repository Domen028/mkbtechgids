<svg viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wordmark { font-family: 'Inter', sans-serif; font-size: 48px; font-weight: 700; fill: #0f2147; }
      .tagline { font-family: 'Inter', sans-serif; font-size: 16px; fill: #15803d; }
    </style>
  </defs>
  
  <!-- Offset layers -->
