  <rect x="75" y="40" width="65" height="45" fill="#0284c7" rx="4"/>
  <rect x="90" y="25" width="65" height="45" fill="#d97706" rx="4"/>
  
  <!-- Wordmark -->
  <text x="180" y="110" class="wordmark">MKBTechGids</text>
  
